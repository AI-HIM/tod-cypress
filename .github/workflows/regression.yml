name: Regression Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [dev, qa, staging, uat]
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'all'
        type: choice
        options: [all, chrome, firefox, electron, webkit]
      tags:
        description: 'Test tags to run'
        required: false
        default: '@regression'

jobs:
  regression:
    name: Regression - ${{ matrix.browser }} - ${{ github.event.inputs.environment || 'qa' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(github.event.inputs.browser == 'all' && '["chrome","firefox","electron","webkit"]' || format('["{0}"]', github.event.inputs.browser || 'chrome')) }}
        containers: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          headed: false
          env: grepTags=${{ github.event.inputs.tags || '@regression' }}
        env:
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}
          TEST_ENV: ${{ github.event.inputs.environment || 'qa' }}

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.browser }}-${{ matrix.containers }}
          path: cypress/reports/json
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots-${{ matrix.browser }}-${{ matrix.containers }}
          path: cypress/reports/screenshots
          retention-days: 7

  merge-reports:
    name: Merge and Publish Reports
    runs-on: ubuntu-latest
    needs: regression
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: regression-report-*
          path: cypress/reports/json
          merge-multiple: true

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge "cypress/reports/json/**/*.json" -o cypress/reports/json/merged.json
          npx marge cypress/reports/json/merged.json -f regression-report -o cypress/reports/html

      - name: Upload final merged report
        uses: actions/upload-artifact@v4
        with:
          name: regression-final-report
          path: cypress/reports/html
          retention-days: 30
